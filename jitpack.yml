jdk:
  - openjdk17

before_install:
  - wget https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.13.4/sherpa-onnx-1.13.4.aar
  - wget https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.13.4/sherpa-onnx-v1.13.4.jar
  - wget https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.13.4/sherpa-onnx-native-lib-linux-aarch64-v1.13.4.jar
  - wget https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.13.4/sherpa-onnx-native-lib-linux-x64-v1.13.4.jar
  - wget https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.13.4/sherpa-onnx-native-lib-osx-aarch64-v1.13.4.jar
  - wget https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.13.4/sherpa-onnx-native-lib-osx-x64-v1.13.4.jar
  - wget https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.13.4/sherpa-onnx-native-lib-win-x64-v1.13.4.jar

install:
  - mvn install:install-file -Dfile=sherpa-onnx-1.13.4.aar -DgroupId=com.k2fsa.sherpa.onnx -DartifactId=sherpa-onnx -Dversion=1.13.4 -Dpackaging=aar -DgeneratePom=true
  - mvn install:install-file -Dfile=sherpa-onnx-v1.13.4.jar -DgroupId=com.k2fsa.sherpa.onnx -DartifactId=sherpa-onnx-jvm -Dversion=1.13.4 -Dpackaging=jar -DgeneratePom=true
  - mvn install:install-file -Dfile=sherpa-onnx-native-lib-linux-aarch64-v1.13.4.jar -DgroupId=com.k2fsa.sherpa.onnx -DartifactId=sherpa-onnx-native-lib-linux-aarch64 -Dversion=1.13.4 -Dpackaging=jar -DgeneratePom=true
  - mvn install:install-file -Dfile=sherpa-onnx-native-lib-linux-x64-v1.13.4.jar -DgroupId=com.k2fsa.sherpa.onnx -DartifactId=sherpa-onnx-native-lib-linux-x64 -Dversion=1.13.4 -Dpackaging=jar -DgeneratePom=true
  - mvn install:install-file -Dfile=sherpa-onnx-native-lib-osx-aarch64-v1.13.4.jar -DgroupId=com.k2fsa.sherpa.onnx -DartifactId=sherpa-onnx-native-lib-osx-aarch64 -Dversion=1.13.4 -Dpackaging=jar -DgeneratePom=true
  - mvn install:install-file -Dfile=sherpa-onnx-native-lib-osx-x64-v1.13.4.jar -DgroupId=com.k2fsa.sherpa.onnx -DartifactId=sherpa-onnx-native-lib-osx-x64 -Dversion=1.13.4 -Dpackaging=jar -DgeneratePom=true
  - mvn install:install-file -Dfile=sherpa-onnx-native-lib-win-x64-v1.13.4.jar -DgroupId=com.k2fsa.sherpa.onnx -DartifactId=sherpa-onnx-native-lib-win-x64 -Dversion=1.13.4 -Dpackaging=jar -DgeneratePom=true
