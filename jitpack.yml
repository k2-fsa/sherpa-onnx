install:
  - FILE="-Dfile=sherpa-onnx-1.13.3.aar"
  - mvn install:install-file $FILE -DgroupId=com.k2fsa.sherpa.onnx -DartifactId=sherpa-onnx -Dversion=1.13.3 -Dpackaging=aar -DgeneratePom=true
