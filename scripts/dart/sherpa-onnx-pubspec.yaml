name: sherpa_onnx

description: >
  Speech recognition, speech synthesis, and speaker recognition using next-gen Kaldi
  with onnxruntime without Internet connection.

repository: https://github.com/k2-fsa/sherpa-onnx/tree/master/sherpa-onnx/flutter

issue_tracker: https://github.com/k2-fsa/sherpa-onnx/issues
documentation: https://k2-fsa.github.io/sherpa/onnx/

topics:
  - speech-recognition
  - speech-synthesis
  - speaker-identification
  - audio-tagging
  - voice-activity-detection

# remember to change the version in ../sherpa_onnx_macos/macos/sherpa_onnx.podspec
version: 1.10.20

homepage: https://github.com/k2-fsa/sherpa-onnx

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  ffi: ^2.1.0
  flutter:
    sdk: flutter

  sherpa_onnx_android_arm64:
    path: ../sherpa_onnx_android_arm64

  sherpa_onnx_android_armeabi:
    path: ../sherpa_onnx_android_armeabi

  sherpa_onnx_android_x86:
    path: ../sherpa_onnx_android_x86

  sherpa_onnx_android_x86_64:
    path: ../sherpa_onnx_android_x86_64

  sherpa_onnx_macos:
    path: ../sherpa_onnx_macos

  sherpa_onnx_linux:
    path: ../sherpa_onnx_linux

  sherpa_onnx_windows:
    path: ../sherpa_onnx_windows

flutter:
  plugin:
    platforms:
      android:
        default_package: sherpa_onnx_android_arm64

      macos:
        default_package: sherpa_onnx_macos

      linux:
        default_package: sherpa_onnx_linux

      windows:
        default_package: sherpa_onnx_windows
