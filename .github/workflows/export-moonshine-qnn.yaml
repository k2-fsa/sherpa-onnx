name: export-moonshine-qnn

on:
  push:
    branches:
      - export-moonshine-qnn
  workflow_dispatch:

concurrency:
  group: export-moonshine-qnn-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate_onnx_matrix:
    if: github.repository_owner == 'k2-fsa' || github.repository_owner == 'csukuangfj'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generating onnx matrix
        id: set-matrix
        run: |
          MATRIX=$(python3 .github/scripts/export-qnn/generate_moonshine.py --model-names)
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  onnx:
    needs: [generate_onnx_matrix]
    if: github.repository_owner == 'k2-fsa' || github.repository_owner == 'csukuangfj'
    name: Export onnx ${{ matrix.model_name }} ${{ matrix.num_seconds }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        ${{ fromJson(needs.generate_onnx_matrix.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          python3 -m pip install \
            torch torchaudio \
            transformers \
            onnxruntime onnx soundfile librosa onnxscript onnxsim

      - name: Export models
        shell: bash
        run: |
          model_name=${{ matrix.model_name }}
          num_seconds=${{ matrix.num_seconds }}

          echo "model_name: $model_name"
          echo "num_seconds: $num_seconds"

          cd scripts/moonshine/v2/qnn

          python3 ./export_onnx.py \
            --model-name UsefulSensors/$model_name \
            --max-len $num_seconds

          ls -lh *.onnx *.txt

      - name: Download test wav
        shell: bash
        run: |
          cd scripts/moonshine/v2/qnn

          model_name=${{ matrix.model_name }}
          lang="${model_name##*-}"
          echo "model_name: $model_name, lang: $lang"
          if [[ $lang == "base" || $lang == "tiny" ]]; then
            lang=en
          fi

          wget -q -O 0.wav https://github.com/k2-fsa/sherpa-onnx/releases/download/asr-models/$lang.wav
          ls -lh *.wav

      - name: Test models
        shell: bash
        run: |
          cd scripts/moonshine/v2/qnn
          python3 ./test_onnx.py --wav ./0.wav

      - name: Collect models
        shell: bash
        run: |
          model_name=${{ matrix.model_name }}
          num_seconds=${{ matrix.num_seconds }}

          src=scripts/moonshine/v2/qnn
          dst=${model_name}-${num_seconds}s

          mkdir -p $dst
          mv -v $src/encoder.onnx $dst/
          mv -v $src/decoder.onnx $dst/
          cp -v $src/tokens.txt $dst/
          cp -v $src/*.wav $dst/
          cp -v $src/*.raw $dst/ 2>/dev/null || true
          cp -v $src/*-encoder.txt $dst/ 2>/dev/null || true
          cp -v $src/*-decoder.txt $dst/ 2>/dev/null || true

          ls -lh $dst/
          tar cjvf $dst.tar.bz2 $dst
          ls -lh *.tar.bz2

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.model_name }}-${{ matrix.num_seconds }}s
          path: ./*.tar.bz2

  # Generate all QNN batch matrices in one job
  generate_qnn_batches:
    if: github.repository_owner == 'csukuangfj' || github.repository_owner == 'k2-fsa'
    runs-on: ubuntu-latest
    outputs:
      batch0: ${{ steps.gen.outputs.batch0 }}
      batch1: ${{ steps.gen.outputs.batch1 }}
      batch2: ${{ steps.gen.outputs.batch2 }}
      batch3: ${{ steps.gen.outputs.batch3 }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate all batch matrices
        id: gen
        run: |
          python3 .github/scripts/export-qnn/generate_moonshine.py --num-batches
          for i in 0 1 2 3; do
            MATRIX=$(python3 .github/scripts/export-qnn/generate_moonshine.py --batch $i 4)
            echo "batch${i}=$MATRIX" >> $GITHUB_OUTPUT
          done

  # QNN conversion jobs - chained sequentially to stay under 220 limit
  # batch0 → batch1 → batch2 → batch3
  qnn_batch0:
    needs: [generate_qnn_batches, onnx]
    if: github.repository_owner == 'k2-fsa' || github.repository_owner == 'csukuangfj'
    name: QNN-b0 ${{ matrix.model_name }} ${{ matrix.soc }} ${{ matrix.num_seconds }}s
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/qnn-sdk:2.40
    strategy:
      fail-fast: false
      matrix:
        ${{ fromJson(needs.generate_qnn_batches.outputs.batch0) }}
    steps:
      - uses: ./.github/actions/qnn-moonshine
        with:
          model_name: ${{ matrix.model_name }}
          num_seconds: ${{ matrix.num_seconds }}
          soc: ${{ matrix.soc }}

  qnn_batch1:
    needs: [generate_qnn_batches, qnn_batch0]
    if: github.repository_owner == 'k2-fsa' || github.repository_owner == 'csukuangfj'
    name: QNN-b1 ${{ matrix.model_name }} ${{ matrix.soc }} ${{ matrix.num_seconds }}s
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/qnn-sdk:2.40
    strategy:
      fail-fast: false
      matrix:
        ${{ fromJson(needs.generate_qnn_batches.outputs.batch1) }}
    steps:
      - uses: ./.github/actions/qnn-moonshine
        with:
          model_name: ${{ matrix.model_name }}
          num_seconds: ${{ matrix.num_seconds }}
          soc: ${{ matrix.soc }}

  qnn_batch2:
    needs: [generate_qnn_batches, qnn_batch1]
    if: github.repository_owner == 'k2-fsa' || github.repository_owner == 'csukuangfj'
    name: QNN-b2 ${{ matrix.model_name }} ${{ matrix.soc }} ${{ matrix.num_seconds }}s
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/qnn-sdk:2.40
    strategy:
      fail-fast: false
      matrix:
        ${{ fromJson(needs.generate_qnn_batches.outputs.batch2) }}
    steps:
      - uses: ./.github/actions/qnn-moonshine
        with:
          model_name: ${{ matrix.model_name }}
          num_seconds: ${{ matrix.num_seconds }}
          soc: ${{ matrix.soc }}

  qnn_batch3:
    needs: [generate_qnn_batches, qnn_batch2]
    if: github.repository_owner == 'k2-fsa' || github.repository_owner == 'csukuangfj'
    name: QNN-b3 ${{ matrix.model_name }} ${{ matrix.soc }} ${{ matrix.num_seconds }}s
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/qnn-sdk:2.40
    strategy:
      fail-fast: false
      matrix:
        ${{ fromJson(needs.generate_qnn_batches.outputs.batch3) }}
    steps:
      - uses: ./.github/actions/qnn-moonshine
        with:
          model_name: ${{ matrix.model_name }}
          num_seconds: ${{ matrix.num_seconds }}
          soc: ${{ matrix.soc }}
