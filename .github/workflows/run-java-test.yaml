name: run-java-test

on:
  push:
    branches:
      - master
      - jni
      - java
    paths:
      - '.github/workflows/run-java-test.yaml'
      - 'cmake/**'
      - 'java-api-examples/**'
      - 'sherpa-onnx/csrc/*'
      - 'sherpa-onnx/jni/*'
      - 'sherpa-onnx/java-api/**'

  workflow_dispatch:

concurrency:
  group: run-java-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  run_java_test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, macos-14]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update version
        shell: bash
        run: |
          ./new-release.sh
          git diff .

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ matrix.os }}-java

      - name: OS info
        shell: bash
        run: |
          uname -a

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin' # See 'Supported distributions' for available options
          java-version: '21'

      - name: Display java version
        shell: bash
        run: |
          java -version
          java -help
          echo "----"
          javac -version
          javac -help
          echo "JAVA_HOME is: ${JAVA_HOME}"

          cmake --version

      - name:  Build sherpa-onnx (jar)
        shell: bash
        run: |
          cd sherpa-onnx/java-api/
          mvn package
          ls -lh target/*.jar

      - uses: actions/upload-artifact@v4
        with:
          name: sherpa-onnx-jar-${{ matrix.os }}
          path: sherpa-onnx/java-api/target

      - name:  Build sherpa-onnx (C++)
        shell: bash
        run: |
          export CMAKE_CXX_COMPILER_LAUNCHER=ccache
          export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"

          mkdir build
          cd build

          cmake \
            -DSHERPA_ONNX_ENABLE_PYTHON=OFF \
            -DSHERPA_ONNX_ENABLE_TESTS=OFF \
            -DSHERPA_ONNX_ENABLE_CHECK=OFF \
            -DBUILD_SHARED_LIBS=ON \
            -DSHERPA_ONNX_ENABLE_PORTAUDIO=OFF \
            -DSHERPA_ONNX_ENABLE_BINARY=OFF \
            -DBUILD_ESPEAK_NG_EXE=OFF \
            -DSHERPA_ONNX_ENABLE_JNI=ON \
            ..

            make -j4
            ls -lh lib

      - name:  Run java version test
        shell: bash
        run: |
          cd ./java-api-examples
          ./run-version-test.sh

      - name:  Run java test (Cohere Transcribe)
        shell: bash
        run: |
          cd ./java-api-examples
          ./run-non-streaming-decode-file-cohere-transcribe.sh
          rm -rf sherpa-onnx-cohere-transcribe-*

      - name:  Run java test (Qwen3 ASR)
        if: matrix.os != 'ubuntu-latest'
        shell: bash
        run: |
          cd ./java-api-examples
          ./run-non-streaming-decode-file-qwen3-asr.sh
          rm -rf sherpa-onnx-qwen3-*

      - name:  Run java test (Non-Streaming ASR)
        shell: bash
        run: |
          cd ./java-api-examples

          ./run-non-streaming-decode-file-fire-red-asr-ctc.sh

          ./run-non-streaming-decode-file-zipformer-ctc.sh
          rm -rf sherpa-onnx-zipformer-ctc-*

          ./run-non-streaming-decode-file-dolphin-ctc.sh
          rm -rf sherpa-onnx-dolphin-*

          ./run-non-streaming-decode-file-moonshine-v2.sh
          ./run-non-streaming-decode-file-moonshine.sh
          rm -rf sherpa-onnx-moonshine-*

          ./run-non-streaming-decode-file-sense-voice.sh
          rm -rf sherpa-onnx-sense-voice-*

          ./run-inverse-text-normalization-paraformer.sh

          ./run-non-streaming-decode-file-paraformer.sh
          rm -rf sherpa-onnx-paraformer-zh-*

          ./run-non-streaming-decode-file-transducer.sh
          rm -rf sherpa-onnx-zipformer-*

          ./run-non-streaming-decode-file-fire-red-asr.sh
          rm -rf sherpa-onnx-fire-red-*

          ./run-non-streaming-decode-file-whisper.sh

          ./run-non-streaming-decode-file-whisper-multiple.sh
          rm -rf sherpa-onnx-whisper-*

          ./run-non-streaming-decode-file-nemo.sh
          rm -rf sherpa-onnx-nemo-*

      - name:  Run java test (FunASR Nano)
        shell: bash
        run: |
          cd ./java-api-examples
          ./run-non-streaming-decode-file-funasr-nano.sh
          rm -rf sherpa-onnx-funasr-*

      - name:  Run java test (MedASR CTC)
        shell: bash
        run: |
          cd ./java-api-examples
          ./run-non-streaming-decode-file-medasr-ctc.sh
          rm -rf sherpa-onnx-medasr-*

      - name:  Run java test (Omnilingual ASR CTC)
        shell: bash
        run: |
          cd ./java-api-examples
          ./run-non-streaming-decode-file-omnilingual-asr-ctc.sh
          rm -rf sherpa-onnx-omnilingual-*

      - name:  Run java test (WeNet CTC)
        shell: bash
        run: |
          cd ./java-api-examples
          ./run-non-streaming-decode-file-wenet-ctc.sh
          rm -rf sherpa-onnx-wenet*

      - name:  Run java test (Streaming T-one)
        shell: bash
        run: |
          cd ./java-api-examples
          ./run-streaming-decode-file-tone-ctc.sh
          rm -rf sherpa-onnx-streaming-t-one-*

      - name:  Run java test (Nemo Canary)
        shell: bash
        run: |
          cd ./java-api-examples
          ./run-non-streaming-decode-file-nemo-canary.sh
          rm -rf sherpa-onnx-nemo-*

      - name:  Run java test (Non-streaming SenseVoice with homophone replacer)
        shell: bash
        run: |
          cd ./java-api-examples
          ./run-non-streaming-decode-file-sense-voice-with-hr.sh
          rm -rf sherpa-onnx-sense-*
          rm -rf dict lexicon.txt replace.fst

      - name:  Run java test (VAD + Non-streaming Dolphin CTC)
        shell: bash
        run: |
          cd ./java-api-examples
          ./run-vad-non-streaming-dolphin-ctc.sh
          rm *.onnx
          ls -lh *.wav
          rm *.wav
          rm -rf sherpa-onnx-dolphin-*

      - name:  Run speech enhancement
        shell: bash
        run: |
          cd ./java-api-examples
          ./run-non-streaming-speech-enhancement-gtcrn.sh
          ./run-non-streaming-speech-enhancement-dpdfnet.sh
          ./run-streaming-speech-enhancement-gtcrn.sh
          ./run-streaming-speech-enhancement-dpdfnet.sh
          ls -lh *.wav

          rm -fv gtcrn_simple.onnx dpdfnet_baseline.onnx *.wav

      - name:  Run java test (Online add punctuations)
        shell: bash
        run: |
          cd ./java-api-examples
          ./run-online-add-punctuation-zh-en.sh
          # Delete model files to save space
          rm -rf sherpa-onnx-online-*

      - name:  Run java test (Offline add punctuations)
        shell: bash
        run: |
          cd ./java-api-examples
          ./run-offline-add-punctuation-zh-en.sh
          # Delete model files to save space
          rm -rf sherpa-onnx-punct-*

      - name:  Run java test (Offline add diacritics)
        shell: bash
        run: |
          cd ./java-api-examples
          ./run-offline-add-diacritics.sh
          # Delete model files to save space
          rm -rf catt_eo_model_onnx

      - name:  Run java test (speaker diarization)
        shell: bash
        run: |
          cd ./java-api-examples
          ./run-offline-speaker-diarization.sh
          rm -rfv *.onnx *.wav sherpa-onnx-pyannote-*

      - name:  Run java test (kws)
        shell: bash
        run: |
          cd ./java-api-examples
          ./run-kws-from-file.sh
          rm -rf sherpa-onnx-*

      - name:  Run java test (VAD + Non-streaming SenseVoice)
        shell: bash
        run: |
          cd ./java-api-examples
          ./run-vad-non-streaming-sense-voice.sh
          rm *.onnx
          ls -lh *.wav
          rm *.wav
          rm -rf sherpa-onnx-*

      - name:  Run java test (VAD + Non-streaming Paraformer)
        shell: bash
        run: |
          cd ./java-api-examples
          ./run-vad-non-streaming-paraformer.sh
          rm *.onnx
          ls -lh *.wav
          rm *.wav
          rm -rf sherpa-onnx-*

      - name:  Run java test (ten-vad remove silence)
        shell: bash
        run: |
          cd ./java-api-examples
          ./run-ten-vad-remove-silence.sh
          rm *.onnx
          ls -lh *.wav
          rm *.wav

      - name:  Run java test (silero-vad remove silence)
        shell: bash
        run: |
          cd ./java-api-examples
          ./run-vad-remove-silence.sh
          rm *.onnx
          ls -lh *.wav
          rm *.wav

      - name:  Run java test (speaker identification)
        shell: bash
        run: |
          cd ./java-api-examples
          ./run-speaker-identification.sh
          # Delete model files to save space
          rm -rf *.onnx
          rm -rf sr-data

      - name:  Run java test (audio tagging)
        shell: bash
        run: |
          cd ./java-api-examples
          ./run-audio-tagging-zipformer-from-file.sh
          # Delete model files to save space
          rm -rf sherpa-onnx-zipformer-*

          ./run-audio-tagging-ced-from-file.sh
          rm -rf sherpa-onnx-ced-*


      - name:  Run java test (Spoken language identification)
        shell: bash
        run: |
          cd ./java-api-examples
          ./run-spoken-language-identification-whisper.sh
          # Delete model files to save space
          rm -rf sherpa-onnx-whisper-*

      - name:  Run java test (Streaming ASR)
        shell: bash
        run: |
          cd ./java-api-examples
          ./run-inverse-text-normalization-transducer.sh
          rm -rf sherpa-onnx-streaming-*

          ./run-streaming-decode-file-ctc.sh
          # Delete model files to save space
          rm -rf sherpa-onnx-streaming-*

          ./run-streaming-decode-file-ctc-hlg.sh
          rm -rf sherpa-onnx-streaming-*

          ./run-streaming-decode-file-paraformer.sh
          rm -rf sherpa-onnx-streaming-*

          ./run-streaming-decode-file-transducer.sh
          rm -rf sherpa-onnx-streaming-*

      - name:  Run java test (Non-Streaming TTS)
        shell: bash
        run: |
          cd ./java-api-examples

           ./run-pocket-tts.sh
           ./run-zipvoice-tts.sh
           ./run-supertonic-tts.sh
           ./run-non-streaming-tts-kitten-en.sh
           ./run-non-streaming-tts-kokoro-zh-en.sh
           ./run-non-streaming-tts-kokoro-en.sh
           ./run-non-streaming-tts-matcha-zh.sh
          ./run-non-streaming-tts-matcha-en.sh
          ls -lh

           rm -rf sherpa-onnx-pocket-tts-*
           rm -rf sherpa-onnx-zipvoice-distill-int8-zh-en-emilia
           rm -rf sherpa-onnx-supertonic-*
           rm -rf kitten-nano-en-*
           rm -rf kokoro-multi-*
           rm -rf kokoro-en-*

           rm -rf matcha-icefall-*
           rm vocos-22khz-univ.onnx
           rm vocos_24khz.onnx

          ./run-non-streaming-tts-piper-en.sh
          rm -rf vits-piper-*

          ./run-non-streaming-tts-coqui-de.sh
          rm -rf vits-coqui-*

          ./run-non-streaming-tts-vits-zh.sh
          rm -rf vits-zh-*

      - uses: actions/upload-artifact@v4
        with:
          name: tts-wav-files-${{ matrix.os }}
          path: java-api-examples/*.wav

  run_maven_test:
    runs-on: ${{ matrix.os }}
    name: maven-${{ matrix.os }} ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: "x64"
            native_lib: linux-x64

          - os: ubuntu-24.04-arm
            arch: "arm64"
            native_lib: linux-aarch64

          - os: macos-latest
            arch: "arm64"
            native_lib: osx-aarch64

          - os: macos-15-intel
            arch: "x64"
            native_lib: osx-x64

          - os: windows-2022
            arch: "x64"
            native_lib: win-x64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Show java version
        shell: bash
        run: |
          java --version
          javac --version

      - name: Update pom.xml for this platform
        shell: bash
        run: |
          cd java-api-examples/maven-examples

          native_lib=${{ matrix.native_lib }}

          # Comment out all native lib dependency blocks, then uncomment the target one
          python3 << 'PYEOF'
          import re

          native_lib = "${{ matrix.native_lib }}"
          target_artifact = f"sherpa-onnx-native-lib-{native_lib}"

          with open("pom.xml", "r") as f:
              content = f.read()

          # Pattern to match a native lib dependency block (commented or not)
          # Each block has a platform comment, then the dependency (possibly wrapped in <!-- -->)
          pattern = re.compile(
              r'(        <!-- [A-Za-z][^\n]*-->\n)'        # platform comment line
              r'(        <!--\n)?'                          # optional opening comment
              r'(        <dependency>\n'
              r'            <groupId>com\.github\.k2-fsa\.sherpa-onnx</groupId>\n'
              r'            <artifactId>(sherpa-onnx-native-lib-[^<]+)</artifactId>\n'
              r'            <version>[^<]+</version>\n'
              r'        </dependency>\n)'
              r'(        -->\n)?',                          # optional closing comment
              re.MULTILINE
          )

          def replace_block(m):
              comment_line = m.group(1)
              dep_block = m.group(3)
              artifact = m.group(4)

              if artifact == target_artifact:
                  # Uncomment: return without comment markers
                  return comment_line + dep_block
              else:
                  # Comment out: wrap in <!-- -->
                  return comment_line + "        <!--\n" + dep_block + "        -->\n"

          content = pattern.sub(replace_block, content)

          with open("pom.xml", "w") as f:
              f.write(content)
          PYEOF

      - name: Show pom.xml for debugging
        shell: bash
        run: |
          cat java-api-examples/maven-examples/pom.xml

      - name: Build maven example
        shell: bash
        run: |
          cd java-api-examples/maven-examples
          mvn package

          ls -lh target/*.jar

      - name: Verify jar contents
        shell: bash
        run: |
          cd java-api-examples/maven-examples

          echo "=== Jar size ==="
          ls -lh target/sherpa-onnx-maven-example-1.0-SNAPSHOT.jar

          echo "=== Native libs in jar ==="
          unzip -l target/sherpa-onnx-maven-example-1.0-SNAPSHOT.jar | grep -E "\.so$|\.dylib$|\.dll$" || true

      - name: Run maven example
        shell: bash
        run: |
          cd java-api-examples/maven-examples
          java -jar target/sherpa-onnx-maven-example-1.0-SNAPSHOT.jar

  run_maven_test_approach1:
    runs-on: ${{ matrix.os }}
    name: maven-approach1-${{ matrix.os }} ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: "x64"

          - os: ubuntu-24.04-arm
            arch: "arm64"

          - os: macos-latest
            arch: "arm64"

          - os: macos-15-intel
            arch: "x64"

          - os: windows-2022
            arch: "x64"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Show java version
        shell: bash
        run: |
          java --version
          javac --version

      - name: Write pom.xml for Approach 1
        shell: bash
        run: |
          cd java-api-examples/maven-examples

          cat > pom.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <project xmlns="http://maven.apache.org/POM/4.0.0"
                   xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                   xsi:schemaLocation="http://maven.apache.org/POM/4.0.0 http://maven.apache.org/xsd/maven-4.0.0.xsd">
              <modelVersion>4.0.0</modelVersion>

              <groupId>com.k2fsa.sherpa.onnx</groupId>
              <artifactId>sherpa-onnx-maven-example</artifactId>
              <version>1.0-SNAPSHOT</version>
              <packaging>jar</packaging>

              <name>sherpa-onnx Maven Example</name>
              <description>Example project demonstrating how to use sherpa-onnx via Maven</description>

              <repositories>
                  <repository>
                      <id>jitpack.io</id>
                      <url>https://jitpack.io</url>
                  </repository>
              </repositories>

              <dependencies>
                  <dependency>
                      <groupId>com.github.k2-fsa</groupId>
                      <artifactId>sherpa-onnx</artifactId>
                      <version>refactor-jar-SNAPSHOT</version>
                  </dependency>
              </dependencies>

              <build>
                  <plugins>
                      <plugin>
                          <groupId>org.apache.maven.plugins</groupId>
                          <artifactId>maven-compiler-plugin</artifactId>
                          <version>3.11.0</version>
                          <configuration>
                              <source>1.8</source>
                              <target>1.8</target>
                          </configuration>
                      </plugin>
                      <plugin>
                          <groupId>org.apache.maven.plugins</groupId>
                          <artifactId>maven-jar-plugin</artifactId>
                          <version>3.3.0</version>
                          <configuration>
                              <archive>
                                  <manifest>
                                      <mainClass>com.k2fsa.sherpa.onnx.example.VersionTest</mainClass>
                                  </manifest>
                              </archive>
                          </configuration>
                      </plugin>
                      <plugin>
                          <groupId>org.apache.maven.plugins</groupId>
                          <artifactId>maven-shade-plugin</artifactId>
                          <version>3.5.1</version>
                          <executions>
                              <execution>
                                  <phase>package</phase>
                                  <goals>
                                      <goal>shade</goal>
                                  </goals>
                              </execution>
                          </executions>
                      </plugin>
                  </plugins>
              </build>
          </project>
          EOF

      - name: Show pom.xml for debugging
        shell: bash
        run: |
          cat java-api-examples/maven-examples/pom.xml

      - name: Build maven example (Approach 1)
        shell: bash
        run: |
          cd java-api-examples/maven-examples
          mvn package

          ls -lh target/*.jar

      - name: Verify jar contents
        shell: bash
        run: |
          cd java-api-examples/maven-examples

          echo "=== Jar size ==="
          ls -lh target/sherpa-onnx-maven-example-1.0-SNAPSHOT.jar

          echo "=== Native libs in jar ==="
          unzip -l target/sherpa-onnx-maven-example-1.0-SNAPSHOT.jar | grep -E "\.so$|\.dylib$|\.dll$" || true

      - name: Run maven example
        shell: bash
        run: |
          cd java-api-examples/maven-examples
          java -jar target/sherpa-onnx-maven-example-1.0-SNAPSHOT.jar

  run_gradle_test:
    runs-on: ${{ matrix.os }}
    name: gradle-${{ matrix.os }} ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: "x64"
            native_lib: linux-x64

          - os: ubuntu-24.04-arm
            arch: "arm64"
            native_lib: linux-aarch64

          - os: macos-latest
            arch: "arm64"
            native_lib: osx-aarch64

          - os: macos-15-intel
            arch: "x64"
            native_lib: osx-x64

          - os: windows-2022
            arch: "x64"
            native_lib: win-x64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Show java version
        shell: bash
        run: |
          java --version
          javac --version

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Update build.gradle for this platform
        shell: bash
        run: |
          cd java-api-examples/gradle-examples

          native_lib=${{ matrix.native_lib }}

          python3 << 'PYEOF'
          import re

          native_lib = "${{ matrix.native_lib }}"
          target_artifact = f"sherpa-onnx-native-lib-{native_lib}"

          with open("build.gradle", "r") as f:
              content = f.read()

          # Comment out all active native lib lines
          def comment_active_lines(content):
              lines = content.split('\n')
              result = []
              for line in lines:
                  stripped = line.strip()
                  if stripped.startswith("implementation 'com.github.k2-fsa.sherpa-onnx:sherpa-onnx-native-lib-"):
                      if target_artifact in stripped:
                          # This is our target - ensure it's uncommented
                          result.append(line)
                      else:
                          # Comment it out
                          result.append('    // ' + stripped)
                  else:
                      result.append(line)
              return '\n'.join(result)

          # Uncomment the target line if it's commented
          def uncomment_target(content):
              lines = content.split('\n')
              result = []
              for line in lines:
                  stripped = line.strip()
                  if stripped.startswith("// implementation 'com.github.k2-fsa.sherpa-onnx:sherpa-onnx-native-lib-"):
                      if target_artifact in stripped:
                          # Uncomment this line
                          result.append('    ' + stripped[3:])
                      else:
                          result.append(line)
                  else:
                      result.append(line)
              return '\n'.join(result)

          content = comment_active_lines(content)
          content = uncomment_target(content)

          with open("build.gradle", "w") as f:
              f.write(content)
          PYEOF

      - name: Show build.gradle for debugging
        shell: bash
        run: |
          cat java-api-examples/gradle-examples/build.gradle

      - name: Build gradle example
        shell: bash
        run: |
          cd java-api-examples/gradle-examples
          ./gradlew build --info

          ls -lh build/libs/*.jar

      - name: Verify jar contents
        shell: bash
        run: |
          cd java-api-examples/gradle-examples

          echo "=== Jar size ==="
          ls -lh build/libs/sherpa-onnx-gradle-example.jar

          echo "=== Native libs in jar ==="
          unzip -l build/libs/sherpa-onnx-gradle-example.jar | grep -E "\.so$|\.dylib$|\.dll$" || true

      - name: Run gradle example
        shell: bash
        run: |
          cd java-api-examples/gradle-examples
          ./gradlew run --info

  run_gradle_test_approach1:
    runs-on: ${{ matrix.os }}
    name: gradle-approach1-${{ matrix.os }} ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: "x64"

          - os: ubuntu-24.04-arm
            arch: "arm64"

          - os: macos-latest
            arch: "arm64"

          - os: macos-15-intel
            arch: "x64"

          - os: windows-2022
            arch: "x64"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Show java version
        shell: bash
        run: |
          java --version
          javac --version

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Write build.gradle for Approach 1
        shell: bash
        run: |
          cd java-api-examples/gradle-examples

          cat > build.gradle << 'EOF'
          plugins {
              id 'application'
              id 'java'
          }

          application {
              mainClass = 'com.k2fsa.sherpa.onnx.example.VersionTest'
          }

          repositories {
              mavenCentral()
              maven { url 'https://jitpack.io' }
          }

          dependencies {
              implementation 'com.github.k2-fsa:sherpa-onnx:refactor-jar-SNAPSHOT'
          }

          java {
              sourceCompatibility = JavaVersion.VERSION_1_8
              targetCompatibility = JavaVersion.VERSION_1_8
          }

          tasks.named('jar') {
              manifest {
                  attributes(
                      'Main-Class': 'com.k2fsa.sherpa.onnx.example.VersionTest'
                  )
              }
              duplicatesStrategy = DuplicatesStrategy.EXCLUDE
              from {
                  configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
              }
          }
          EOF

      - name: Show build.gradle for debugging
        shell: bash
        run: |
          cat java-api-examples/gradle-examples/build.gradle

      - name: Build gradle example (Approach 1)
        shell: bash
        run: |
          cd java-api-examples/gradle-examples
          ./gradlew build --info

          ls -lh build/libs/*.jar

      - name: Verify jar contents
        shell: bash
        run: |
          cd java-api-examples/gradle-examples

          echo "=== Jar size ==="
          ls -lh build/libs/sherpa-onnx-gradle-example.jar

          echo "=== Native libs in jar ==="
          unzip -l build/libs/sherpa-onnx-gradle-example.jar | grep -E "\.so$|\.dylib$|\.dll$" || true

      - name: Run gradle example
        shell: bash
        run: |
          cd java-api-examples/gradle-examples
          ./gradlew run --info

  run_gradle_kts_test:
    runs-on: ${{ matrix.os }}
    name: gradle-kts-${{ matrix.os }} ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: "x64"

          - os: ubuntu-24.04-arm
            arch: "arm64"

          - os: macos-latest
            arch: "arm64"

          - os: macos-15-intel
            arch: "x64"

          - os: windows-2022
            arch: "x64"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Show java version
        shell: bash
        run: |
          java --version
          javac --version

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Show build.gradle.kts for debugging
        shell: bash
        run: |
          cat java-api-examples/gradle-kts-examples/build.gradle.kts

      - name: Build gradle kts example
        shell: bash
        run: |
          cd java-api-examples/gradle-kts-examples
          ./gradlew build --info

          ls -lh build/libs/*.jar

      - name: Verify jar contents
        shell: bash
        run: |
          cd java-api-examples/gradle-kts-examples

          echo "=== Jar size ==="
          ls -lh build/libs/sherpa-onnx-gradle-kts-example.jar

          echo "=== Native libs in jar ==="
          unzip -l build/libs/sherpa-onnx-gradle-kts-example.jar | grep -E "\.so$|\.dylib$|\.dll$" || true

      - name: Run gradle kts example
        shell: bash
        run: |
          cd java-api-examples/gradle-kts-examples
          ./gradlew run --info
