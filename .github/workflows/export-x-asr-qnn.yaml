name: export-x-asr-qnn

on:
  push:
    branches:
      - x-asr-qnn-models
  workflow_dispatch:

concurrency:
  group: export-x-asr-qnn-${{ github.ref }}
  cancel-in-progress: true

jobs:
  export_streaming:
    if: github.repository_owner == 'k2-fsa' || github.repository_owner == 'csukuangfj'
    name: streaming ONNX
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        chunk_size_ms: [160, 480, 960, 1920]

    steps:
      - uses: actions/checkout@v4

      - name: Clone icefall
        shell: bash
        run: |
          git clone https://github.com/k2-fsa/icefall

      - name: Export onnx models
        uses: addnab/docker-run-action@v3
        with:
            image: ghcr.io/${{ github.repository_owner }}/icefall:cpu-py3.10-torch2.6.0-v20250630
            options: |
              --volume ${{ github.workspace }}/icefall:/icefall
              --volume ${{ github.workspace }}/:/sherpa-onnx
            shell: bash
            run: |
              export PYTHONPATH=/icefall:$PYTHONPATH
              cd /icefall
              git config --global --add safe.directory /icefall

              python3 -m torch.utils.collect_env
              python3 -m k2.version

              python3 -m pip install kaldi-native-fbank

              chunk_size_ms=${{ matrix.chunk_size_ms }}

              /sherpa-onnx/scripts/zipformer-transducer/x-asr/qnn/export-streaming.sh $chunk_size_ms

              mv punct /sherpa-onnx
              mv no-punct /sherpa-onnx
              mv test_wavs /sherpa-onnx

      - name: Show model files
        shell: bash
        run: |
          ls -lh punct
          echo "---"
          ls -lh no-punct

      - name: Create tar file
        shell: bash
        run: |
          chunk_size_ms=${{ matrix.chunk_size_ms }}
          mkdir $chunk_size_ms
          dst=$chunk_size_ms
          cp -av punct $dst
          cp -av no-punct $dst
          ls -lh $dst/
          tar cjvf $dst.tar.bz2 $dst
          ls -lh *.tar.bz2

      - uses: actions/upload-artifact@v4
        with:
          name: x-asr-onnx-${{ matrix.chunk_size_ms }}
          path: ./*.tar.bz2

  generate_build_matrix:
    if: github.repository_owner == 'csukuangfj' || github.repository_owner == 'k2-fsa'
    # see https://github.com/pytorch/pytorch/pull/50633
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generating build matrix
        id: set-matrix
        run: |
          # outputting for debugging purposes
          python3 .github/scripts/export-qnn/generate_streaming_zipformer_transducer_x_asr.py
          MATRIX=$(python3 .github/scripts/export-qnn/generate_streaming_zipformer_transducer_x_asr.py)

          # deprecated
          # echo "::set-output name=matrix::${MATRIX}"
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  export-streaming-zipformer-transducer-to-qnn:
    needs: [generate_build_matrix, export_streaming]
    if: github.repository_owner == 'k2-fsa' || github.repository_owner == 'csukuangfj'
    name: ${{ matrix.model_name }} ${{ matrix.soc }} ${{ matrix.chunk_size }} use_punct ${{ matrix.use_punct }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        ${{ fromJson(needs.generate_build_matrix.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Retrieve artifact
        uses: actions/download-artifact@v4
        with:
          name: x-asr-onnx-${{ matrix.chunk_size }}
          path: /tmp/

      - name: Show
        shell: bash
        run: |
          use_punct=${{ matrix.use_punct }}
          chunk_size=${{ matrix.chunk_size }}

          dir=$PWD
          mkdir -p model-files/$chunk_size

          ls -lh /tmp/

          pushd /tmp
          echo "chunk_size: $chunk_size"

          ls -lh ${chunk_size}.tar.bz2

          tar xvf ${chunk_size}.tar.bz2

          echo "---"

          ls -lh $chunk_size/*
          popd
          if [[ $use_punct == '1' ]]; then
            mv -v /tmp/$chunk_size/punct/* $dir/model-files/$chunk_size/
          else
            mv -v /tmp/$chunk_size/no-punct/* $dir/model-files/$chunk_size/
          fi

      - name: Show
        shell: bash
        run: |
          ls -lh model-files
          echo "---"
          ls -lh model-files/*

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Create directories
        shell: bash
        run: |
          mkdir so binary

      - name: Display NDK HOME
        shell: bash
        run: |
          echo "ANDROID_NDK_LATEST_HOME: ${ANDROID_NDK_LATEST_HOME}"
          ls -lh ${ANDROID_NDK_LATEST_HOME}

      - name: Create Python virtual environment
        shell: bash
        run: |
          python3 -m venv py310
          which python3
          source py310/bin/activate
          which python3

      - name: Show ndk-build help
        shell: bash
        run: |
          export PATH=${ANDROID_NDK_LATEST_HOME}:$PATH
          ndk-build --help

      - name: Download toolkit
        shell: bash
        run: |
          url=https://huggingface.co/csukuangfj/qnn-toolkit/resolve/main/v2.40.0.251030.zip
          for i in $(seq 1 10); do
            curl -SL -O $url
            size=$(stat -c%s v2.40.0.251030.zip 2>/dev/null || stat -f%z v2.40.0.251030.zip 2>/dev/null)
            if [ "$size" -gt 100000000 ]; then
              echo "Download succeeded, size=$size"
              break
            fi
            echo "Download failed (size=$size), retrying in 30s... ($i/10)"
            rm -f v2.40.0.251030.zip
            sleep 30
          done
          ls -lh v2.40.0.251030.zip

      - name: Unzip toolkit
        shell: bash
        run: |
          unzip v2.40.0.251030.zip

      - name: Show
        shell: bash
        run: |
          ls -lh

          echo "---ls -lh qairt---"

          ls -lh qairt

          echo "---"

      - name: Install linux dependencies
        shell: bash
        run: |
          ls -lh

          echo "---"

          ls -lh qairt

          cd qairt/2.40.0.251030/bin
          source envsetup.sh

          yes | sudo ${QNN_SDK_ROOT}/bin/check-linux-dependency.sh || true

      - name: Install Python dependencies
        shell: bash
        run: |
          source py310/bin/activate

          cd qairt/2.40.0.251030/bin
          source envsetup.sh

          python3 -m pip install \
            mock \
            numpy \
            opencv-python \
            optuna \
            packaging \
            pandas \
            paramiko \
            pathlib2 \
            pillow \
            plotly \
            protobuf \
            psutil \
            pydantic \
            pytest \
            pyyaml \
            rich \
            scikit-optimize \
            scipy \
            six \
            tabulate \
            typing-extensions \
            xlsxwriter

          python3 "${QNN_SDK_ROOT}/bin/check-python-dependency" || true

          which python3

      - name: Install onnx dependencies
        shell: bash
        run: |
          source py310/bin/activate
          python3 -m pip install --upgrade \
            torch==2.0.0+cpu -f https://download.pytorch.org/whl/torch \
            kaldi_native_fbank \
            pip \
            "numpy<2" \
            onnx==1.17.0 \
            onnxruntime==1.17.1 \
            soundfile \
            librosa \
            onnxsim \
            sentencepiece \
            pyyaml

          which python3

      - name: Show qnn-onnx-converter help
        shell: bash
        run: |
          source py310/bin/activate

          pushd qairt/2.40.0.251030/bin
          source envsetup.sh
          popd

          qnn-onnx-converter --help

      - name: Show qnn-model-lib-generator help
        shell: bash
        run: |
          source py310/bin/activate

          pushd qairt/2.40.0.251030/bin
          source envsetup.sh
          popd

          qnn-model-lib-generator --help

      - name: Show qnn-net-run help
        shell: bash
        run: |
          source py310/bin/activate

          pushd qairt/2.40.0.251030/bin
          source envsetup.sh
          popd

          qnn-net-run --help

      - name: Run ${{ matrix.chunk_size }}
        if: matrix.model_name == '20260605'
        shell: bash
        run: |
          source py310/bin/activate

          pushd qairt/2.40.0.251030/bin
          source envsetup.sh
          popd

          export PATH=${ANDROID_NDK_LATEST_HOME}:$PATH

          ndk-build --help


          export LDFLAGS="-Wl,-z,max-page-size=16384"
          dir=$PWD
          chunk_size=${{ matrix.chunk_size }}
          model_dir=$PWD/model-files/$chunk_size
          soc=${{ matrix.soc }}

          python3 ./scripts/pyannote/segmentation/show-onnx.py --filename $model_dir/encoder.onnx
          echo "---"
          python3 ./scripts/pyannote/segmentation/show-onnx.py --filename $model_dir/decoder.onnx
          echo "---"
          python3 ./scripts/pyannote/segmentation/show-onnx.py --filename $model_dir/joiner.onnx

          export PATH=${ANDROID_NDK_LATEST_HOME}:$PATH

          echo "export to qnn"
          echo "----------$chunk_size----------"

          for m in encoder decoder joiner; do
            echo "Processing $m"
            qnn-onnx-converter \
              --input_network $model_dir/$m.onnx \
              --output_path ./non_quant/$m.cpp \
              --act_bitwidth 16 \
              --bias_bitwidth 32 > ${m}-log-converter.t 2>&1

            ls -lh non_quant

            python3 ./scripts/qnn/generate_config.py  \
                --soc $soc \
                --graph-name $m \
                --output-dir ./non_quant/my-config-$m \
                --qnn-sdk-root $QNN_SDK_ROOT

            ls -lh non_quant/my-config-$m

            head -n100 ./non_quant/my-config-$m/*.json

            python3 "${QNN_SDK_ROOT}/bin/x86_64-linux-clang/qnn-model-lib-generator" \
                -c non_quant/$m.cpp \
                -b non_quant/$m.bin \
                -o non_quant/model_libs > ${m}-log-generator.txt 2>&1

            ls -lh non_quant/model_libs
            echo "---"
            ls -lh non_quant/model_libs/x86_64-linux-clang
            echo "---"
            ls -lh non_quant/model_libs/aarch64-android


            $QNN_SDK_ROOT/bin/x86_64-linux-clang/qnn-context-binary-generator \
              --backend $QNN_SDK_ROOT/lib/x86_64-linux-clang/libQnnHtp.so \
              --model ./non_quant/model_libs/x86_64-linux-clang/lib$m.so \
              --output_dir ./non_quant/binary \
              --binary_file $m \
              --config_file ./non_quant/my-config-$m/htp_backend_extensions.json > ${m}-log-generator.txt 2>&1

            ls -lh non_quant/binary/
          done

          readelf -lW non_quant/model_libs/*/lib*.so

          echo "collect results"

          use_punct=${{ matrix.use_punct }}
          if [[ $use_punct == '1' ]]; then
            d=sherpa-onnx-qnn-${{ matrix.soc }}-binary-x-asr-streaming-zipformer-transducer-zh-en-punct-2026-06-05-chunk-size-${chunk_size}ms
          else
            d=sherpa-onnx-qnn-${{ matrix.soc }}-binary-x-asr-streaming-zipformer-transducer-zh-en-2026-06-05-chunk-size-${chunk_size}ms
          fi
          mkdir -p $d
          mkdir -p $d/test_wavs
          cp -v non_quant/binary/*.bin $d/
          cp -v $model_dir/tokens.txt $d

          pushd $d/test_wavs

          curl -SL -O https://huggingface.co/csukuangfj/sherpa-onnx-streaming-zipformer-bilingual-zh-en-2023-02-20/resolve/main/test_wavs/0.wav
          curl -SL -O https://huggingface.co/csukuangfj/sherpa-onnx-streaming-zipformer-bilingual-zh-en-2023-02-20/resolve/main/test_wavs/1.wav
          curl -SL -O https://huggingface.co/csukuangfj/sherpa-onnx-streaming-zipformer-bilingual-zh-en-2023-02-20/resolve/main/test_wavs/2.wav
          curl -SL -O https://huggingface.co/csukuangfj/sherpa-onnx-streaming-zipformer-bilingual-zh-en-2023-02-20/resolve/main/test_wavs/3.wav
          curl -SL -O https://huggingface.co/csukuangfj/sherpa-onnx-streaming-zipformer-bilingual-zh-en-2023-02-20/resolve/main/test_wavs/8k.wav

          popd

          echo "chunk_size=${chunk_size}ms" > $d/info.txt

          ls -lh $d
          tar cjfv $d.tar.bz2 $d
          ls -lh *.tar.bz2
          rm -rf $d

          mkdir -p binary
          mv *.tar.bz2 ./binary/

          for p in x86_64-linux-clang aarch64-android; do
            if [[ $p == x86_64-linux-clang ]]; then
              if [[ $use_punct == '1' ]]; then
                d=sherpa-onnx-qnn-x-asr-streaming-zipformer-transducer-zh-en-punct-2026-06-05-chunk-size-${chunk_size}ms-linux-x64
              else
                d=sherpa-onnx-qnn-x-asr-streaming-zipformer-transducer-zh-en-2026-06-05-chunk-size-${chunk_size}ms-linux-x64
              fi
            elif [[ $p == aarch64-android ]]; then
              if [[ $use_punct == '1' ]]; then
                d=sherpa-onnx-qnn-x-asr-streaming-zipformer-transducer-zh-en-punct-2026-06-05-chunk-size-${chunk_size}ms-android-aarch64
              else
                d=sherpa-onnx-qnn-x-asr-streaming-zipformer-transducer-zh-en-2026-06-05-chunk-size-${chunk_size}ms-android-aarch64
              fi
            else
              echo "Unknown $p"
              exit -1
            fi

            mkdir -p $d
            mkdir -p $d/test_wavs
            pushd $d/test_wavs

            curl -SL -O https://huggingface.co/csukuangfj/sherpa-onnx-streaming-zipformer-bilingual-zh-en-2023-02-20/resolve/main/test_wavs/0.wav
            curl -SL -O https://huggingface.co/csukuangfj/sherpa-onnx-streaming-zipformer-bilingual-zh-en-2023-02-20/resolve/main/test_wavs/1.wav
            curl -SL -O https://huggingface.co/csukuangfj/sherpa-onnx-streaming-zipformer-bilingual-zh-en-2023-02-20/resolve/main/test_wavs/2.wav
            curl -SL -O https://huggingface.co/csukuangfj/sherpa-onnx-streaming-zipformer-bilingual-zh-en-2023-02-20/resolve/main/test_wavs/3.wav
            curl -SL -O https://huggingface.co/csukuangfj/sherpa-onnx-streaming-zipformer-bilingual-zh-en-2023-02-20/resolve/main/test_wavs/8k.wav

            popd

            cp -v non_quant/model_libs/$p/lib*.so $d/
            cp -v $model_dir/tokens.txt $d

            echo "chunk_size=${chunk_size}ms" > $d/info.txt
            echo "target=$p" >> $d/info.txt

            ls -lh $d
            tar cjfv $d.tar.bz2 $d
            ls -lh *.tar.bz2
            rm -rf $d
          done

          echo "----show---"
          ls -lh *.tar.bz2

          mkdir -p so

          mv *.tar.bz2 ./so

      - name: Setup tmate session
        # if: true
        if: failure()
        uses: mxschmitt/action-tmate@v3

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.model_name }}-${{ matrix.soc }}-${{ matrix.chunk_size }}-use-punct-${{ matrix.use_punct }}-json
          path: ./non_quant/*.json

      - name: Release
        if: github.repository_owner == 'csukuangfj' && matrix.soc == 'SM8850'
        uses: svenstaro/upload-release-action@v2
        with:
          file_glob: true
          file: ./so/*.tar.bz2
          overwrite: true
          repo_name: k2-fsa/sherpa-onnx
          repo_token: ${{ secrets.UPLOAD_GH_SHERPA_ONNX_TOKEN }}
          tag: asr-models-qnn

      - name: Release
        if: github.repository_owner == 'csukuangfj'
        uses: svenstaro/upload-release-action@v2
        with:
          file_glob: true
          file: ./binary/*.tar.bz2
          overwrite: true
          repo_name: k2-fsa/sherpa-onnx
          repo_token: ${{ secrets.UPLOAD_GH_SHERPA_ONNX_TOKEN }}
          tag: asr-models-qnn-binary

      - name: Release
        if: github.repository_owner == 'k2-fsa' && matrix.soc == 'SM8850'
        uses: svenstaro/upload-release-action@v2
        with:
          file_glob: true
          file: ./so/*.tar.bz2
          overwrite: true
          tag: asr-models-qnn

      - name: Release
        if: github.repository_owner == 'k2-fsa'
        uses: svenstaro/upload-release-action@v2
        with:
          file_glob: true
          file: ./binary/*.tar.bz2
          overwrite: true
          tag: asr-models-qnn-binary
