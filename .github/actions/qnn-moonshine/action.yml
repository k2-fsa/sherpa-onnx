# https://docs.github.com/en/actions/sharing-automations/creating-actions/creating-a-composite-action
name: QNN Moonshine Conversion
description: Convert moonshine ONNX models to QNN binary format

inputs:
  model_name:
    description: Model name (e.g., moonshine-base-zh)
    required: true
  num_seconds:
    description: Max audio length in seconds
    required: true
  soc:
    description: Target SoC (e.g., SM8850)
    required: true
  repo_token:
    description: GitHub token for releases
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Retrieve artifact
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.model_name }}-${{ inputs.num_seconds }}s
        path: /tmp/

    - name: Extract and convert
      shell: bash
      run: |
        model_name=${{ inputs.model_name }}
        num_seconds=${{ inputs.num_seconds }}
        soc=${{ inputs.soc }}

        if [[ $model_name == moonshine-tiny ]]; then
          dst_name=moonshine-tiny-en
        elif [[ $model_name == moonshine-base ]]; then
          dst_name=moonshine-base-en
        else
          dst_name=$model_name
        fi

        dir=$PWD
        mkdir -p model-files
        pushd /tmp
        src=${model_name}-${num_seconds}s
        tar xvf $src.tar.bz2
        popd
        mv -v /tmp/$src/* $dir/model-files/
        model_dir=$PWD/model-files

        mkdir so binary

        pushd $QNN_SDK_ROOT/bin
        source envsetup.sh
        popd
        export PATH=${ANDROID_NDK_LATEST_HOME}:$PATH

        for m in encoder decoder; do
          cp $model_dir/$m.onnx ./
          cp $model_dir/tokens.txt ./

          if [[ $m == 'encoder' ]]; then
            cat $model_dir/*-encoder.txt > encoder.txt 2>/dev/null || true
            qnn-onnx-converter \
              --input_network ./$m.onnx \
              --output_path ./quant/$m.cpp \
              --input_list encoder.txt \
              --use_native_input_files \
              --act_bitwidth 16 \
              --bias_bitwidth 32 > ${m}-log.txt 2>&1
          else
            qnn-onnx-converter \
              --input_network ./$m.onnx \
              --output_path ./quant/$m.cpp \
              --act_bitwidth 16 \
              --bias_bitwidth 32 > ${m}-log.txt 2>&1
          fi

          python3 ./scripts/qnn/generate_config.py \
            --soc $soc --graph-name $m \
            --output-dir ./quant/my-config-$m --qnn-sdk-root $QNN_SDK_ROOT

          python3 "${QNN_SDK_ROOT}/bin/x86_64-linux-clang/qnn-model-lib-generator" \
            -c quant/$m.cpp -b quant/$m.bin \
            -o quant/model_libs > ${m}-gen.txt 2>&1

          $QNN_SDK_ROOT/bin/x86_64-linux-clang/qnn-context-binary-generator \
            --backend $QNN_SDK_ROOT/lib/x86_64-linux-clang/libQnnHtp.so \
            --model ./quant/model_libs/x86_64-linux-clang/lib$m.so \
            --output_dir ./quant/binary --binary_file $m \
            --config_file ./quant/my-config-$m/htp_backend_extensions.json > ${m}-ctx.txt 2>&1
        done

        d=sherpa-onnx-qnn-${soc}-binary-${dst_name}-${num_seconds}s
        mkdir -p $d/test_wavs
        cp -v quant/binary/*.bin $d/
        cp -v $model_dir/tokens.txt $d
        cp -v $model_dir/*.wav $d/test_wavs
        echo "model_name=${dst_name}" > $d/info.txt
        echo "num_seconds=${num_seconds}s" >> $d/info.txt
        tar cjfv $d.tar.bz2 $d
        mkdir -p binary
        mv *.tar.bz2 ./binary/

        for p in x86_64-linux-clang aarch64-android; do
          if [[ $p == x86_64-linux-clang ]]; then
            d=sherpa-onnx-qnn-${dst_name}-${num_seconds}s-linux-x64
          else
            d=sherpa-onnx-qnn-${dst_name}-${num_seconds}s-android-aarch64
          fi
          mkdir -p $d/test_wavs
          cp -v quant/model_libs/$p/lib*.so $d/
          cp -v $model_dir/tokens.txt $d
          cp -v $model_dir/*.wav $d/test_wavs
          echo "model_name=${dst_name}" > $d/info.txt
          echo "num_seconds=${num_seconds}s" >> $d/info.txt
          echo "target=$p" >> $d/info.txt
          tar cjfv $d.tar.bz2 $d
          rm -rf $d
        done

        mkdir -p so
        mv *.tar.bz2 ./so

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ${{ inputs.model_name }}-${{ inputs.soc }}-${{ inputs.num_seconds }}s-json
        path: ./quant/*.json

    - name: Release
      if: github.repository_owner == 'csukuangfj' && inputs.soc == 'SM8850'
      uses: svenstaro/upload-release-action@v2
      with:
        file_glob: true
        file: ./so/*.tar.bz2
        overwrite: true
        repo_name: k2-fsa/sherpa-onnx
        repo_token: ${{ inputs.repo_token }}
        tag: asr-models-qnn-3

    - name: Release
      if: github.repository_owner == 'csukuangfj'
      uses: svenstaro/upload-release-action@v2
      with:
        file_glob: true
        file: ./binary/*.tar.bz2
        overwrite: true
        repo_name: k2-fsa/sherpa-onnx
        repo_token: ${{ inputs.repo_token }}
        tag: asr-models-qnn-binary-3

    - name: Release
      if: github.repository_owner == 'k2-fsa' && inputs.soc == 'SM8850'
      uses: svenstaro/upload-release-action@v2
      with:
        file_glob: true
        file: ./so/*.tar.bz2
        overwrite: true
        tag: asr-models-qnn-3

    - name: Release
      if: github.repository_owner == 'k2-fsa'
      uses: svenstaro/upload-release-action@v2
      with:
        file_glob: true
        file: ./binary/*.tar.bz2
        overwrite: true
        tag: asr-models-qnn-binary-3
